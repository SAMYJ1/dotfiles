
# ===============================
# 🧩 基础设置
# ===============================

# 使用现代配置路径 (~/.config/tmux)
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# 使用 256 色 + truecolor（kitty）
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:RGB,ghostty:RGB"
set -gu default-command
set -g default-shell /bin/zsh

# 允许 kitty 图形协议透传（tmux 3.3+）
set -g allow-passthrough on

# 状态栏刷新时间
set -g status-interval 5

# 鼠标支持（支持滚动、点击选择 pane、调整 pane 大小）
set -g mouse on

# 历史记录长度
set -g history-limit 10000
%if "#{>=:#{version},3.6}"
set -g pane-scrollbars modal
set -g pane-scrollbars-position right
set -g pane-scrollbars-style "fg=#585b70"
set -g tiled-layout-max-columns 2
%endif

# 消息提示显示时间（单位 ms）
set -g display-time 1000

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @plugin 'alexwforsythe/tmux-which-key'

# ===============================
# ⚡️ 快捷键绑定
# ===============================

# 改变默认 prefix 键为 Ctrl + a
# unbind C-b
set -g prefix C-b
bind C-b send-prefix

# 重新加载配置
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux config ✅"
bind f display-popup -E -w 85% -h 85% -d "#{pane_current_path}" "/Users/eugene/.config/tmux/scripts/tmux-session-project-switcher.sh"
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
bind ? display-popup -E -w 70% -h 80% -T "tmux cheatsheet" "/Users/eugene/.config/tmux/scripts/tmux-cheatsheet.sh"
bind m display-menu -T "tmux menu" -x R -y P \
  "Projects" f "display-popup -E -w 85% -h 85% -d '#{pane_current_path}' '/Users/eugene/.config/tmux/scripts/tmux-session-project-switcher.sh'" \
  "Session Tree" s "choose-tree -Zw" \
  "Lazygit" g "display-popup -E -w 90% -h 90% -d '#{pane_current_path}' 'lazygit'" \
  "Cheatsheet" ? "display-popup -E -w 70% -h 80% -T 'tmux cheatsheet' '/Users/eugene/.config/tmux/scripts/tmux-cheatsheet.sh'" \
  "" "" "" \
  "Reload config" r "source-file ~/.config/tmux/tmux.conf"

# ===============================
# 🪟 面板操作（使用 Vim 风格）
# ===============================

bind n next-window
bind p previous-window
bind L next-window
bind H previous-window

# 分屏
bind | split-window -h
bind - split-window -v

# 清屏
bind K run "tmux send-keys -R; tmux clear-history"

# 关闭面板
bind x kill-pane

# 在 h/j/k/l 之间移动
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# 交换面板位置（可选）
# bind H swap-pane -L
# bind L swap-pane -R

# 调整面板大小
bind -r < resize-pane -L 5
bind -r > resize-pane -R 5
bind -r + resize-pane -U 2
bind -r _ resize-pane -D 2


# ===============================
# 🎨 外观美化（可按需修改）
# ===============================

set -g status-position top
set -g status-style default
set -g status-left "#[fg=green]⫸ #S#[default] "
set -g @bg default
set -g @fg "#aaaaaa"
set -g @fg-current "#89B4FB"
set -g popup-style "bg=default"
set -g popup-border-style "fg=#585b70"
set -g menu-style "fg=#aaaaaa,bg=default"
set -g menu-border-style "fg=#585b70"

# set -g status-justify "absolute-centre"
set -g status-justify "left"
setw -g window-status-separator " ⟢ "
set -g window-status-style "bg=#{@bg},fg=#{@fg}"
set -g window-status-format " #W "
set -g window-status-current-format "#[bg=#{@bg},fg=#{@fg-current},bold] #W #[fg=#39BAE6,bg=#{@bg}]#{?window_zoomed_flag,󰊓,}#[fg=#{@fg},bg=default]"
set -g status-right '#{prefix_highlight} #[fg=#7196d1]#(echo "#{pane_current_path}" | sed "s|$HOME|~|") '
set -g status-right-length 1000
set -g status-left-length 1000

# ===============================
# 🧠 其他实用设置
# ===============================

# 复制模式使用 vi 风格
setw -g mode-keys vi
set -g set-clipboard on
%if "#{>=:#{version},3.6}"
set -g copy-mode-position-style "fg=#89b4fa"
set -g copy-mode-selection-style "fg=#1e1e2e,bg=#89b4fa"
%endif
bind-key -T copy-mode Escape if-shell -F "#{selection_present}" "send-keys -X clear-selection" "send-keys -X cancel"
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi Escape if-shell -F "#{selection_present}" "send-keys -X clear-selection" "send-keys -X cancel"

# 鼠标复制兼容模式
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear

set -g @yank_action 'copy-selection'
run '~/.config/tmux/plugins/tpm/tpm'
