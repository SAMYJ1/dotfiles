[mgr]
prepend_keymap = [
  { on = [
    "<C-f>",
  ], run = 'seek 5', desc = "Seek down 5 units in the preview content" },
  { on = [
    "<C-b>",
  ], run = 'seek -5', desc = "Seek down 5 units in the preview content" },
  { on = [
    "T",
  ], run = "plugin toggle-pane max-preview", desc = "Maximize or restore preview pane" },
  { on = [
    "f",
  ], run = "plugin jump-to-char", desc = "Jump to file by first char" },
  { on = [
    "F",
  ], run = "plugin smart-filter", desc = "Smart filter (open/enter on submit)" },
]
